<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格產生器 - 範本版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
    :root {
  --primary: #3b82f6;
  --bg: #e2e8f0;
  --sidebar: #ffffff;
  --blue: #0056b3;
  --green: #198754;
  --dark: #212529;
}
 body {
  font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
  margin: 0;
  display: flex;
  height: 100vh;
  background: var(--bg);
}
/* --- Sidebar --- */
 .sidebar {
  width: 360px;
  background: var(--sidebar);
  display: flex;
  flex-direction: column;
  border-right: 1px solid #cbd5e1;
}
 .sidebar-header {
  padding: 15px 20px;
  background: #1e293b;
  color: white;
}
 .scroll-content {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}
 .section-title {
  font-size: 0.8rem;
  color: #64748b;
  margin: 15px 0 8px;
  font-weight: bold;
  text-transform: uppercase;
  border-bottom: 1px solid #f1f5f9;
  padding-bottom: 4px;
}
 .btn-group {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
 .btn-group button {
  flex: 1;
  padding: 8px 5px;
  border: 1px solid #cbd5e1;
  background: #fff;
  cursor: pointer;
  border-radius: 6px;
  font-size: 0.85rem;
  transition: 0.2s;
}
 .btn-group button.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
 .btn-group button:hover:not(.active) {
  background: #f8fafc;
}
 input, textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  margin-bottom: 10px;
  box-sizing: border-box;
  font-size: 0.9rem;
}
 textarea {
  height: 70px;
  resize: vertical;
  background: #fcfcfc;
}
 .btn-img {
  width: 100%;
  padding: 12px;
  background: #10b981;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  font-size: 1rem;
}
 .btn-img:hover {
  background: #059669;
}
/* --- Preview Area --- */
 .preview-area {
  flex: 1;
  padding: 40px;
  overflow: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
 #export-canvas {
  background: white;
  padding: 50px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.15);
  display: flex;
  box-sizing: border-box;
}
 .layout-vertical {
  flex-direction: column;
  gap: 35px;
  width: 850px;
}
 .layout-horizontal {
  flex-direction: row;
  gap: 25px;
  width: auto;
  align-items: flex-start;
}
 .table-block {
  flex: 1;
  min-width: 280px;
}
 .table-block h3 {
  margin: 0 0 12px;
  padding-left: 12px;
  outline: none;
  font-size: 1.3rem;
}
 table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}
 th, td {
  border: 1px solid #e2e8f0;
  padding: 12px;
  text-align: left;
}
/* --- Themes --- */
 .theme-blue h3 {
  border-left: 5px solid var(--blue);
  color: var(--blue);
}
 .theme-blue th {
  background: var(--blue);
  color: white;
}
 .theme-blue tr:nth-child(even) {
  background: #f1f7ff;
}
 .theme-green h3 {
  border-left: 5px solid var(--green);
  color: var(--green);
}
 .theme-green th {
  background: var(--green);
  color: white;
}
 .theme-green tr:nth-child(even) {
  background: #f0fdf4;
}
 .theme-dark h3 {
  border-bottom: 3px solid var(--dark);
  color: var(--dark);
  padding-left: 0;
}
 .theme-dark th {
  background: var(--dark);
  color: white;
}

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header"><h2 style="margin:0; font-size:1.2rem;">表格產生器</h2></div>
        <div class="scroll-content">
            
            <div class="section-title">快速範本選擇</div>
            <div class="btn-group">
                <button onclick="applyPreset('sales')">銷售月報</button>
                <button onclick="applyPreset('schedule')">一週排程</button>
                <button onclick="applyPreset('clear')">清空內容</button>
            </div>

            <div class="section-title">1. 排版與主題</div>
            <div class="btn-group" data-type="layout">
                <button class="active" data-value="layout-vertical">垂直</button>
                <button data-value="layout-horizontal">水平並排</button>
            </div>
            <div class="btn-group" data-type="theme">
                <button class="active" data-value="theme-blue">商務藍</button>
                <button data-value="theme-green">簡約綠</button>
                <button data-value="theme-dark">現代黑</button>
            </div>

            <div class="section-title">2. 字體設定 (電腦內建)</div>
            <input type="text" id="fontInput" placeholder="例如: Arial, 標楷體, Microsoft JhengHei" oninput="updateStyles()">

            <div class="section-title">3. 內容編輯 (CSV 格式)</div>
            <div id="inputContainer">
                <textarea placeholder="區塊 A"></textarea>
                <textarea placeholder="區塊 B"></textarea>
                <textarea placeholder="區塊 C"></textarea>
            </div>

            <button class="btn-img" onclick="exportImage()">📷 匯出為圖片</button>
        </div>
    </aside>

    <main class="preview-area">
        <div id="export-canvas" class="layout-vertical theme-blue"></div>
    </main>

    <script>
        const canvas = document.getElementById('export-canvas');
        const textareas = document.querySelectorAll('#inputContainer textarea');
        const fontInput = document.getElementById('fontInput');
        let config = { layout: 'layout-vertical', theme: 'theme-blue' };

        // 預設資料集
        const presets = {
            sales: {
                layout: 'layout-horizontal',
                theme: 'theme-blue',
                font: 'Arial',
                content: [
                    "產品名稱,銷量,庫存\n智慧手機,120,50\n平板電腦,85,30\n藍牙耳機,210,15",
                    "區域,負責人,達成率\n台北,小明,95%\n台中,小華,88%\n高雄,小李,92%",
                    "備註\n1. 本月銷量成長 15%\n2. 庫存警示：耳機不足"
                ]
            },
            schedule: {
                layout: 'layout-vertical',
                theme: 'theme-green',
                font: '標楷體',
                content: [
                    "時段,週一,週二\n上午,部門會議,產品開發\n下午,客戶拜訪,內部培訓",
                    "工作項目,優先級,進度\nUI 設計,高,100%\n資料庫對接,中,60%",
                    "本週目標\n完成所有模組測試並提交報告。"
                ]
            },
            clear: {
                layout: 'layout-vertical', theme: 'theme-blue', font: '', content: ["", "", ""]
            }
        };

        function init() {
            // 切換按鈕事件
            document.querySelectorAll('.btn-group[data-type]').forEach(group => {
                group.onclick = (e) => {
                    if (e.target.tagName !== 'BUTTON') return;
                    config[group.dataset.type] = e.target.dataset.value;
                    updateUIButtons(group, e.target);
                    updateStyles();
                };
            });
            textareas.forEach(area => area.oninput = render);
            applyPreset('sales'); // 預設載入銷售範本
        }

        function applyPreset(key) {
            const data = presets[key];
            config.layout = data.layout;
            config.theme = data.theme;
            fontInput.value = data.font;
            
            // 更新按鈕狀態
            updateUIButtons(document.querySelector('[data-type="layout"]'), document.querySelector(`[data-value="${data.layout}"]`));
            updateUIButtons(document.querySelector('[data-type="theme"]'), document.querySelector(`[data-value="${data.theme}"]`));

            // 填入內容
            textareas.forEach((area, i) => area.value = data.content[i] || "");
            
            updateStyles();
            render();
        }

        function updateUIButtons(group, activeBtn) {
            group.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === activeBtn));
        }

        function updateStyles() {
            canvas.className = `${config.layout} ${config.theme}`;
            canvas.style.fontFamily = fontInput.value || '"PingFang TC", "Microsoft JhengHei", sans-serif';
        }

        function render() {
            canvas.innerHTML = Array.from(textareas).map((area) => {
                const lines = area.value.trim().split('\n');
                if (!lines[0]) return '';

                const tableHTML = lines.map((line, rowIdx) => {
                    const cells = line.split(/,|\t/);
                    const Tag = rowIdx === 0 ? 'th' : 'td';
                    const content = cells.map(c => `<${Tag}>${escapeHtml(c)}</${Tag}>`).join('');
                    return rowIdx === 0 ? `<thead><tr>${content}</tr></thead><tbody>` : `<tr>${content}</tr>${rowIdx === lines.length-1 ? '</tbody>':' '}`;
                }).join('');

                return `<div class="table-block"><h3 contenteditable="true">${area.placeholder}</h3><table>${tableHTML}</table></div>`;
            }).join('');
        }

        function escapeHtml(str) {
            const p = document.createElement('p'); p.textContent = str; return p.innerHTML;
        }

        async function exportImage() {
            const btn = document.querySelector('.btn-img');
            btn.innerText = "正在處理...";
            const canvasImg = await html2canvas(canvas, { scale: 2, useCORS: true });
            const link = document.createElement('a');
            link.download = `Report_${Date.now()}.png`;
            link.href = canvasImg.toDataURL();
            link.click();
            btn.innerText = "📷 匯出為圖片";
        }

        init();
    </script>
</body>
</html>
